<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捏卡皮巴拉</title>
    <!-- 設定網頁圖標 -->
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }
        #background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }
        #ar-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            transform: scaleX(-1);
            display: none;
        }
        #steam-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 1;
            display: none;
        }
        #video-preview-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            overflow: hidden;
            z-index: 100;
            transform: scaleX(-1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: none;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            position: relative;
            z-index: 10;
        }
        .ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 110;
        }
        .status-card {
            background: rgba(41, 37, 36, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border-left: 6px solid #fbbf24;
            pointer-events: auto;
            max-width: 320px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .control-group {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        select, button {
            background: #44403c;
            color: #fde68a;
            border: 1px solid #57534e;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        select:hover, button:hover {
            background: #57534e;
        }
        #info-tag {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            color: #fbbf24;
            z-index: 110;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #start-camera-btn {
            background: #fbbf24;
            color: #1c1917;
            font-weight: bold;
            padding: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateX(-20px);
        }
        #show-ui-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 120;
            background: rgba(41, 37, 36, 0.8);
            color: #fbbf24;
            border: 1px solid #fbbf24;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
            cursor: pointer;
        }
        #bandaid-btn { background: #fde68a; color: #854d0e; font-weight: bold; }
        #add-capybara-btn { background: #4ade80; color: #064e3b; font-weight: bold; }
        #eat-btn { background: #f87171; color: #7f1d1d; font-weight: bold; }
        
        footer {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            z-index: 110;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            transition: opacity 0.3s ease;
        }
        footer a { color: #fbbf24; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="background-layer"></div>
    <video id="ar-video" autoplay playsinline></video>
    <div id="steam-overlay"></div>

    <button id="show-ui-btn">顯示選單</button>

    <div class="ui-overlay" id="main-ui">
        <div class="status-card" id="control-card">
            <h1 class="text-xl font-bold text-amber-400 mb-1">捏卡皮巴拉</h1>
            
            <div id="camera-setup-area" class="mb-3">
                <label class="text-xs block mb-1 text-amber-100">選擇攝影機：</label>
                <select id="camera-select" class="w-full mb-2 text-black">
                    <option value="">正在載入鏡頭...</option>
                </select>
                <button id="start-camera-btn" class="w-full rounded-lg">啟動攝影機</button>
            </div>

            <div class="instruction-box bg-orange-900/20 p-2 rounded-lg border border-orange-500/30 mb-2">
                <p class="text-xs font-bold text-orange-200 mb-1">操作說明：</p>
                <div class="text-[11px] text-orange-100">● 捏合：大拇指與食指靠近 (100px) 即可抓取</div>
                <div class="text-[11px] text-orange-100">● 疊加：利用高摩擦力將牠們疊在一起</div>
                <div class="text-[11px] text-orange-100">● 烤熟：推到右下角營火區，變黑後可吃掉</div>
            </div>
            
            <div class="control-group">
                <button id="add-capybara-btn">✨ 新增卡皮巴拉</button>
                <div class="flex gap-1">
                    <button id="bandaid-btn" class="flex-1">🩹 貼OK繃</button>
                    <button id="eat-btn" class="flex-1">🍴 吃掉熟水豚</button>
                </div>
                <div>
                    <label class="text-xs block mb-1">場景切換：</label>
                    <select id="bg-select" class="w-full text-black">
                        <option value="ar">透視模式 (AR)</option>
                        <option value="onsen">溫暖溫泉</option>
                        <option value="pool">清涼水池</option>
                        <option value="land">青青草地</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button id="reset-pos" class="flex-1 text-xs">重置位置</button>
                    <button id="reset-size" class="flex-1 text-xs">重置大小</button>
                </div>
                <button id="hide-ui-btn" class="w-full border-dashed border-amber-500/50 mt-1 text-xs">隱藏介面並全螢幕</button>
            </div>
        </div>
    </div>

    <div id="info-tag">
        <div class="flex gap-4">
            <span>面積: <span id="area-val">0</span> px</span>
            <span style="color: #f87171;">飢餓值: <span id="hunger-val">0</span></span>
        </div>
        <div class="flex gap-4 text-[10px] opacity-80">
            <span>X: <span id="pos-x">0</span></span>
            <span>Y: <span id="pos-y">0</span></span>
        </div>
    </div>

    <div id="video-preview-container">
        <video id="input-video" class="hidden"></video>
        <canvas id="output-video-canvas" style="width: 100%; height: 100%;"></canvas>
    </div>

    <canvas id="game-canvas"></canvas>

    <footer>
        版權所有 © 2026 <a href="https://pandapanda6666.github.io" target="_blank">PandaPanda的AI日常</a> All Rights Reserved.
    </footer>

    <script>
        const { Engine, Render, Runner, World, Bodies, Composite, Constraint, Events, Vector, Body } = Matter;

        const bgImages = { pool: '1.jpg', onsen: '2.jpg', land: '3.jpg' };
        const bgLayer = document.getElementById('background-layer');
        const arVideo = document.getElementById('ar-video');
        const steamOverlay = document.getElementById('steam-overlay');
        const bgSelect = document.getElementById('bg-select');
        const areaValLabel = document.getElementById('area-val');
        const hungerValLabel = document.getElementById('hunger-val');
        const posXVal = document.getElementById('pos-x');
        const posYVal = document.getElementById('pos-y');
        const startBtn = document.getElementById('start-camera-btn');
        const cameraSelect = document.getElementById('camera-select');
        const hideUiBtn = document.getElementById('hide-ui-btn');
        const showUiBtn = document.getElementById('show-ui-btn');
        const bandaidBtn = document.getElementById('bandaid-btn');
        const addCapybaraBtn = document.getElementById('add-capybara-btn');
        const eatBtn = document.getElementById('eat-btn');
        const controlCard = document.getElementById('control-card');
        const infoTag = document.getElementById('info-tag');

        const canvas = document.getElementById('game-canvas');
        const engine = Engine.create();
        const world = engine.world;
        
        engine.gravity.y = 1.2;
        engine.positionIterations = 15;
        engine.velocityIterations = 15;

        const render = Render.create({
            canvas: canvas, engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let capybaras = [];
        let hungerValue = 0;

        function createCapybara(xx, yy) {
            const radius = 90;
            const segments = 45;
            const particles = [];
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                particles.push(Bodies.circle(xx + Math.cos(angle) * radius, yy + Math.sin(angle) * radius, 8, {
                    friction: 1.0, 
                    frictionStatic: 2.5,
                    restitution: 0, 
                    frictionAir: 0.05, 
                    render: { visible: false }
                }));
            }
            const constraints = [];
            for (let i = 0; i < segments; i++) {
                constraints.push(Constraint.create({
                    bodyA: particles[i], bodyB: particles[(i + 1) % segments],
                    stiffness: 0.9, damping: 0.1, render: { visible: false }
                }));
            }
            const center = Bodies.circle(xx, yy, 25, { isSensor: true, render: { visible: false } });
            particles.forEach(p => {
                constraints.push(Constraint.create({
                    bodyA: center, bodyB: p, stiffness: 0.22, damping: 0.1, render: { visible: false }
                }));
            });
            const composite = Composite.create({ bodies: [...particles, center], constraints });
            World.add(world, composite);
            
            const capy = {
                composite,
                particles,
                center,
                radius,
                roastedLevel: 0,
                bruises: []
            };
            capybaras.push(capy);
            return capy;
        }

        createCapybara(window.innerWidth / 2, window.innerHeight / 2);

        function setUiVisibility(visible) {
            if (visible) {
                controlCard.classList.remove('ui-hidden');
                infoTag.classList.remove('ui-hidden');
                showUiBtn.style.display = 'none';
                if (document.fullscreenElement) document.exitFullscreen().catch(e => {});
            } else {
                controlCard.classList.add('ui-hidden');
                infoTag.classList.add('ui-hidden');
                showUiBtn.style.display = 'block';
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => {});
            }
        }

        hideUiBtn.onclick = () => setUiVisibility(false);
        showUiBtn.onclick = () => setUiVisibility(true);

        async function getCameras() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `攝影機 ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
            } catch (err) { 
                console.error("無法列出攝影機:", err);
                cameraSelect.innerHTML = '<option value="">權限拒絕</option>';
            }
        }
        getCameras();

        cameraSelect.onchange = async () => {
            if (cameraInstance) { 
                try { await cameraInstance.stop(); } catch(e) {}
                cameraInstance = null; 
            }
            startBtn.innerText = "啟動攝影機";
            startBtn.disabled = false;
            startBtn.style.animation = 'pulse 2s infinite';
            startBtn.style.background = '#fbbf24';
        };

        function updateBackground() {
            const mode = bgSelect.value;
            arVideo.style.display = 'none'; steamOverlay.style.display = 'none'; bgLayer.style.backgroundImage = 'none';
            if (mode === 'ar') { 
                arVideo.style.display = 'block';
            } else { 
                bgLayer.style.backgroundImage = `url('${bgImages[mode]}')`; 
                if (mode === 'onsen') steamOverlay.style.display = 'block'; 
            }
        }
        bgSelect.addEventListener('change', updateBackground);
        // 初始化為透視模式
        updateBackground();

        let currentWalls = [];
        function createWalls() {
            if (currentWalls.length > 0) World.remove(world, currentWalls);
            const opt = { isStatic: true, friction: 1.0, restitution: 0, render: { visible: false } };
            const W = window.innerWidth, H = window.innerHeight;
            const groundY = H * 0.875;

            currentWalls = [
                Bodies.rectangle(W / 2, groundY + 300, W + 2000, 600, opt), 
                Bodies.rectangle(W / 2, -300, W + 2000, 600, opt),         
                Bodies.rectangle(-300, H / 2, 600, H + 2000, opt),        
                Bodies.rectangle(W + 300, H / 2, 600, H + 2000, opt)      
            ];
            World.add(world, currentWalls);
        }
        createWalls();

        addCapybaraBtn.onclick = () => {
            createCapybara(window.innerWidth / 2 + (Math.random()-0.5)*80, 100);
        };

        bandaidBtn.onclick = () => {
            capybaras.forEach(c => {
                const target = c.bruises.find(b => !b.hasBandaid);
                if (target) target.hasBandaid = true;
            });
        };

        eatBtn.onclick = () => {
            const sorted = [...capybaras].sort((a, b) => b.roastedLevel - a.roastedLevel);
            if (sorted.length > 0 && sorted[0].roastedLevel > 80) {
                const target = sorted[0];
                World.remove(world, target.composite);
                capybaras = capybaras.filter(c => c !== target);
                hungerValue += 20; 
                hungerValLabel.innerText = hungerValue;
            }
        };

        document.getElementById('reset-pos').onclick = () => {
            capybaras.forEach((c) => {
                const xx = window.innerWidth / 2;
                const yy = window.innerHeight / 2;
                Body.setPosition(c.center, { x: xx, y: yy });
                c.particles.forEach(p => Body.setPosition(p, { x: xx, y: yy }));
                Body.setVelocity(c.center, { x: 0, y: 0 });
            });
        };

        document.getElementById('reset-size').onclick = () => {
            capybaras.forEach(c => {
                const cx = c.center.position.x, cy = c.center.position.y;
                c.particles.forEach((p, i) => {
                    const a = (i / c.particles.length) * Math.PI * 2;
                    Body.setPosition(p, { x: cx + Math.cos(a) * c.radius, y: cy + Math.sin(a) * c.radius });
                    Body.setVelocity(p, { x: 0, y: 0 });
                });
            });
        };

        Events.on(engine, 'afterUpdate', () => {
            const W = window.innerWidth, H = window.innerHeight;
            const roastX = W - 150, roastY = H - 120;

            capybaras.forEach(c => {
                if (c.center.position.y > H + 200) {
                    Body.setPosition(c.center, { x: W/2, y: H/2 });
                }

                const distToFire = Math.hypot(c.center.position.x - roastX, c.center.position.y - roastY);
                if (distToFire < 130) {
                    c.roastedLevel = Math.min(100, c.roastedLevel + 0.3);
                }

                c.particles.forEach(p => {
                    const dx = p.position.x - c.center.position.x, dy = p.position.y - c.center.position.y;
                    const d = Math.hypot(dx, dy);
                    if (d < 30) {
                        const a = Math.atan2(dy, dx);
                        Body.setPosition(p, { x: c.center.position.x + Math.cos(a) * 30, y: c.center.position.y + Math.sin(a) * 30 });
                    }
                    if (p.position.x < 15) Body.setPosition(p, { x: 15, y: p.position.y });
                    if (p.position.x > W - 15) Body.setPosition(p, { x: W - 15, y: p.position.y });
                });

                let area = 0;
                for (let i = 0; i < c.particles.length; i++) {
                    const p1 = c.particles[i].position, p2 = c.particles[(i+1)%c.particles.length].position;
                    area += (p1.x * p2.y) - (p2.x * p1.y);
                }
                area = Math.abs(area) * 0.5;
                if (area < 10000) {
                    const cx = c.center.position.x, cy = c.center.position.y;
                    c.particles.forEach((p, i) => {
                        const a = (i / c.particles.length) * Math.PI * 2;
                        Body.setPosition(p, { x: cx + Math.cos(a) * c.radius, y: cy + Math.sin(a) * c.radius });
                    });
                }
            });

            if (capybaras.length > 0) {
                const first = capybaras[0];
                posXVal.innerText = Math.round(first.center.position.x);
                posYVal.innerText = Math.round(first.center.position.y);
                let a = 0;
                for (let i = 0; i < first.particles.length; i++) {
                    const p1 = first.particles[i].position, p2 = first.particles[(i+1)%first.particles.length].position;
                    a += (p1.x * p2.y) - (p2.x * p1.y);
                }
                areaValLabel.innerText = Math.round(Math.abs(a) * 0.5);
            }
        });

        const videoElement = document.getElementById('input-video');
        const videoPreviewCtx = document.getElementById('output-video-canvas').getContext('2d');
        let lastResults = null, cameraInstance = null;
        const activePinches = new Map();
        const prevHandPos = new Map();

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        
        hands.onResults((results) => {
            lastResults = results;
            videoPreviewCtx.save();
            videoPreviewCtx.clearRect(0, 0, 200, 150);
            videoPreviewCtx.drawImage(results.image, 0, 0, 200, 150);
            videoPreviewCtx.restore();

            if (bgSelect.value === 'ar' && cameraInstance) {
                arVideo.srcObject = videoElement.srcObject;
            }

            if (results.multiHandLandmarks) {
                const W = window.innerWidth, H = window.innerHeight;
                const activeIndices = new Set();

                results.multiHandLandmarks.forEach((lms, handIdx) => {
                    activeIndices.add(handIdx);
                    const getPx = (i) => ({ x: (1 - lms[i].x) * W, y: lms[i].y * H });
                    const thumb = getPx(4), indexF = getPx(8), palm = getPx(0);
                    // 優化抓取距離：提升至 100 像素
                    const pinchPos = (Math.hypot(thumb.x - indexF.x, thumb.y - indexF.y) < 100) ? { x: (thumb.x + indexF.x)/2, y: (thumb.y + indexF.y)/2 } : null;

                    if (prevHandPos.has(handIdx)) {
                        const prev = prevHandPos.get(handIdx);
                        const speed = Math.hypot(palm.x - prev.x, palm.y - prev.y);
                        if (speed > 80) {
                            capybaras.forEach(c => {
                                const dist = Math.hypot(palm.x - c.center.position.x, palm.y - c.center.position.y);
                                if (dist < 130) {
                                    let bestP = 0, minDist = 999;
                                    c.particles.forEach((p, i) => {
                                        const d = Math.hypot(p.position.x - palm.x, p.position.y - palm.y);
                                        if (d < minDist) { minDist = d; bestP = i; }
                                    });
                                    if (c.bruises.length < 15 && !c.bruises.find(b => b.particleIndex === bestP && !b.hasBandaid)) {
                                        c.bruises.push({ particleIndex: bestP, offset: { x: (Math.random()-0.5)*15, y: (Math.random()-0.5)*15 }, hasBandaid: false });
                                    }
                                }
                            });
                        }
                    }
                    prevHandPos.set(handIdx, palm);

                    if (pinchPos) {
                        if (!activePinches.has(handIdx)) {
                            let closestP = null, minDist = 180;
                            capybaras.forEach(c => {
                                c.particles.forEach(p => {
                                    const d = Math.hypot(p.position.x - pinchPos.x, p.position.y - pinchPos.y);
                                    if (d < minDist) { minDist = d; closestP = p; }
                                });
                            });
                            if (closestP) {
                                const cns = Constraint.create({ pointA: pinchPos, bodyB: closestP, stiffness: 0.5, render: { visible: true, strokeStyle: '#fbbf24', lineWidth: 3 } });
                                World.add(world, cns);
                                activePinches.set(handIdx, { constraint: cns });
                            }
                        } else { activePinches.get(handIdx).constraint.pointA = pinchPos; }
                    } else if (activePinches.has(handIdx)) {
                        World.remove(world, activePinches.get(handIdx).constraint);
                        activePinches.delete(handIdx);
                    }
                });
                for (let k of activePinches.keys()) if (!activeIndices.has(k)) { World.remove(world, activePinches.get(k).constraint); activePinches.delete(k); }
            } else {
                activePinches.forEach(v => World.remove(world, v.constraint)); activePinches.clear(); prevHandPos.clear();
            }
        });

        startBtn.onclick = async () => {
            const deviceId = cameraSelect.value; 
            if (!deviceId) return;
            startBtn.innerText = "正在啟動..."; 
            startBtn.disabled = true;
            if (cameraInstance) {
                try { await cameraInstance.stop(); } catch(e) {}
                cameraInstance = null;
            }
            await new Promise(r => setTimeout(r, 300));
            try {
                cameraInstance = new Camera(videoElement, {
                    onFrame: async () => { if (hands) await hands.send({image: videoElement}); },
                    width: 640, height: 480, deviceId: deviceId
                });
                await cameraInstance.start().catch(err => { throw new Error("Timeout starting video source"); });
                startBtn.innerText = "攝影機已連線"; 
                startBtn.style.animation = 'none'; 
                startBtn.style.background = '#4ade80';
                if (bgSelect.value === 'ar') { arVideo.srcObject = videoElement.srcObject; }
            } catch (err) { 
                console.error(err);
                startBtn.innerText = "連線超時，請重試"; 
                startBtn.disabled = false;
                startBtn.style.background = '#f87171';
            }
        };

        Events.on(render, 'afterRender', () => {
            const ctx = render.context, W = window.innerWidth, H = window.innerHeight;

            // --- 強化版營火特效 ---
            const rx = W - 150, ry = H - 120;
            ctx.save();
            // 基礎光暈
            const glow = ctx.createRadialGradient(rx, ry, 10, rx, ry, 100);
            glow.addColorStop(0, 'rgba(255, 120, 0, 0.4)');
            glow.addColorStop(1, 'rgba(255, 60, 0, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath(); ctx.arc(rx, ry, 100, 0, Math.PI*2); ctx.fill();
            
            // 繪製動態火苗 (取代表情符號)
            const time = Date.now() * 0.005;
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const offset = Math.sin(time + i) * 15;
                const fx = rx + Math.cos(angle) * 20;
                const fy = ry + Math.sin(angle) * 10 + offset;
                const fSize = 25 + Math.cos(time * 2 + i) * 10;
                
                const fGrad = ctx.createRadialGradient(fx, fy, 2, fx, fy, fSize);
                fGrad.addColorStop(0, '#fffbe6');
                fGrad.addColorStop(0.3, '#ffcc00');
                fGrad.addColorStop(0.6, '#ff6600');
                fGrad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = fGrad;
                ctx.beginPath();
                ctx.arc(fx, fy, fSize, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
            
            ctx.font = 'bold 16px sans-serif'; ctx.fillStyle = '#ffcc00'; ctx.textAlign = 'center';
            ctx.shadowColor = 'black'; ctx.shadowBlur = 4;
            ctx.fillText('烤卡皮巴拉區', rx, ry - 75);
            ctx.restore();
            // --- 營火特效結束 ---

            capybaras.forEach(c => {
                const pts = c.particles, center = c.center.position;
                ctx.beginPath(); ctx.moveTo(pts[0].position.x, pts[0].position.y);
                for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].position.x, pts[i].position.y);
                ctx.closePath();

                const level = c.roastedLevel;
                const r = Math.floor(161 - level * 1.3), g = Math.floor(98 - level * 0.9), b = Math.floor(7 - level * 0.05);
                const grad = ctx.createRadialGradient(center.x, center.y - 15, 10, center.x, center.y, c.radius * 1.2);
                grad.addColorStop(0, `rgb(${r+30}, ${g+30}, ${b})`);
                grad.addColorStop(1, `rgb(${r}, ${g}, ${b})`);
                ctx.fillStyle = grad; ctx.fill();
                ctx.strokeStyle = '#452205'; ctx.lineWidth = 4; ctx.stroke();

                c.bruises.forEach(br => {
                    const p = pts[br.particleIndex].position;
                    const bx = p.x + br.offset.x, by = p.y + br.offset.y;
                    if (br.hasBandaid) {
                        ctx.save(); ctx.translate(bx, by); ctx.rotate(Math.PI/4);
                        ctx.fillStyle = '#eec9a3'; ctx.fillRect(-12, -7, 24, 14);
                        ctx.strokeStyle = '#d4a373'; ctx.lineWidth = 1; ctx.strokeRect(-12, -7, 24, 14);
                        ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.font = '9px sans-serif'; ctx.fillText('+', -3, 4);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = 'rgba(75, 0, 130, 0.4)';
                        ctx.beginPath(); ctx.arc(bx, by, 10, 0, Math.PI*2); ctx.fill();
                    }
                });

                const bAngle = Math.atan2(pts[0].position.y - center.y, pts[0].position.x - center.x);
                ctx.save(); ctx.translate(center.x, center.y); ctx.rotate(bAngle);
                const drawEar = (s) => {
                    ctx.fillStyle = '#713f12'; ctx.beginPath();
                    ctx.arc(s * 40, -c.radius - 5, 14, 0, Math.PI*2);
                    ctx.fill(); ctx.strokeStyle = '#452205'; ctx.lineWidth = 2; ctx.stroke();
                };
                drawEar(-1); drawEar(1);
                ctx.fillStyle = '#854d0e'; ctx.beginPath(); ctx.roundRect(-30, 0, 60, 25, 10); ctx.fill();
                ctx.fillStyle = '#29180c'; ctx.beginPath(); ctx.arc(-7, 15, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(7, 15, 3, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#1c1917'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(-25, -10); ctx.lineTo(-15, -8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(25, -10); ctx.lineTo(15, -8); ctx.stroke();
                ctx.restore();

                let topP = pts[0]; pts.forEach(p => { if(p.position.y < topP.position.y) topP = p; });
                ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(topP.position.x, topP.position.y - 10, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#16a34a'; ctx.beginPath(); ctx.ellipse(topP.position.x, topP.position.y - 25, 8, 4, Math.PI/4, 0, Math.PI*2); ctx.fill();
            });

            if (lastResults && lastResults.multiHandLandmarks) {
                lastResults.multiHandLandmarks.forEach(lms => {
                    ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)'; ctx.lineWidth = 3;
                    HAND_CONNECTIONS.forEach(([s, e]) => {
                        ctx.beginPath(); ctx.moveTo((1 - lms[s].x) * W, lms[s].y * H); ctx.lineTo((1 - lms[e].x) * W, lms[e].y * H); ctx.stroke();
                    });
                });
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            render.options.width = window.innerWidth; render.options.height = window.innerHeight;
            createWalls();
        });
        setTimeout(() => { document.getElementById('reset-pos').onclick(); }, 1000);
    </script>
</body>
</html>
